name: Build
on:
  push:
    branches: [master]
    tags: [v*.*.*]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ren'Py
        uses: remarkablegames/setup-renpy@v2
        with:
          cli-version: 8.5.3
          web: true

      - name: Build web
        run: renpy-launcher web_build . --destination web

      - name: Upload web artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: web

      - name: Delete web artifacts
        run: rm -r web web.zip

      - name: Distribute
        run: renpy-launcher distribute . --destination dist

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'master'
    permissions:
      contents: write
    steps:
      - name: Download web artifacts
        uses: actions/download-artifact@v8
        with:
          name: web
          path: web

      - name: Add .nojekyll
        run: touch web/.nojekyll

      - name: Push
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: web-deploy
          build_dir: web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: github.ref_type == 'tag'
    steps:
      - name: Download web artifacts
        uses: actions/download-artifact@v8
        with:
          name: web
          path: web

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Zip web artifacts
        run: |
          cd web
          zip -r ../dist/web.zip .
          cd ..

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*

  upload-itchio:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'tag'
    steps:
      - name: Set up butler
        uses: remarkablegames/setup-butler@v3

      - name: Download web artifacts
        uses: actions/download-artifact@v8
        with:
          name: web
          path: web

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Upload to itch.io
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          butler push web "$ITCHIO_PROJECT:web" --userversion "$version"
          butler push dist/*-pc.zip "$ITCHIO_PROJECT:win-linux" --userversion "$version"
          butler push dist/*-win.zip "$ITCHIO_PROJECT:win" --userversion "$version"
          butler push dist/*-mac.zip "$ITCHIO_PROJECT:mac" --userversion "$version"
          butler push dist/*-linux.tar.bz2 "$ITCHIO_PROJECT:linux" --userversion "$version"
        env:
          ITCHIO_PROJECT: UlyssesZhan/the-papillion-effect
          BUTLER_API_KEY: ${{ secrets.ITCHIO_API_KEY }}
